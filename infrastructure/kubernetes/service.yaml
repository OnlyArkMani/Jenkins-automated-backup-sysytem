apiVersion: v1
kind: Service
metadata:
  name: weather-dashboard-service
  namespace: default
  labels:
    app: weather-dashboard
    project: devops-cse3253

spec:
  type: NodePort
  selector:
    app: weather-dashboard
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30500