name: CI/CD Pipeline (GitHub Actions)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Lint with flake8
        run: |
          flake8 src/app.py \
            --max-line-length=100 \
            --format="%(path)s:%(row)d:%(col)d: %(code)s %(text)s"

      - name: Run tests with pytest
        run: |
          pytest src/tests/test_app.py \
            -v \
            --tb=short \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f infrastructure/docker/Dockerfile \
            -t weather-dashboard:${{ github.run_number }} \
            -t weather-dashboard:latest \
            .

      - name: Verify image exists
        run: docker images | grep weather-dashboard

      - name: Run container smoke test
        run: |
          docker run -d \
            --name smoke-test \
            -p 5000:5000 \
            -e OPENWEATHER_API_KEY=dummykey \
            weather-dashboard:latest

          sleep 5

          curl --fail http://localhost:5000/health && echo "Health check passed "

          docker stop smoke-test

  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image for scanning
        run: |
          docker build \
            -f infrastructure/docker/Dockerfile \
            -t weather-dashboard:scan \
            .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'weather-dashboard:scan'
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'