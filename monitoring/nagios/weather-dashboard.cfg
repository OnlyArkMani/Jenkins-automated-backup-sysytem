define host {
    host_name               weather-app
    alias                   Weather Dashboard (Flask)
    address                 weather-app
    max_check_attempts      3
    check_period            24x7
    check_interval          1
    retry_interval          1
    contact_groups          devops-team
    notification_interval   30
    notification_period     24x7
    notifications_enabled   1
    check_command           check-host-alive
}

define service {
    host_name               weather-app
    service_description     HTTP Port 5000
    check_command           check_http!-p 5000
    max_check_attempts      3
    check_interval          1
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
    contact_groups          devops-team
}

define service {
    host_name               weather-app
    service_description     Health Endpoint /health
    check_command           check_http!-p 5000 -u /health -s "healthy"
    max_check_attempts      3
    check_interval          1
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
    contact_groups          devops-team
}

define service {
    host_name               weather-app
    service_description     Response Time
    check_command           check_http!-p 5000 -u /health -w 2 -c 5
    max_check_attempts      3
    check_interval          2
    retry_interval          1
    check_period            24x7
    notification_interval   60
    notification_period     24x7
    contact_groups          devops-team
}

define service {
    host_name               weather-app
    service_description     API Recent Searches Endpoint
    check_command           check_http!-p 5000 -u /api/recent -s "status"
    max_check_attempts      3
    check_interval          5
    retry_interval          1
    check_period            24x7
    notification_interval   60
    notification_period     24x7
    contact_groups          devops-team
}

define contactgroup {
    contactgroup_name       devops-team
    alias                   DevOps Team
    members                 devops-student
}

define contact {
    contact_name                    devops-student
    alias                           DevOps Student
    email                           your-email@university.edu
    service_notification_period     24x7
    host_notification_period        24x7
    service_notification_options    w,u,c,r
    host_notification_options       d,r
    service_notification_commands   notify-service-by-email
    host_notification_commands      notify-host-by-email
}